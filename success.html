<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kòmand Konfime — Fèl Gou</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌶️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Jost', sans-serif; background: #FAF4E8; color: #3A2E20; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .card { text-align: center; max-width: 500px; width: 100%; }
  .check { font-size: 3.5rem; margin-bottom: 1.5rem; display: block; }
  .brand { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 700; color: #4E0E0E; margin-bottom: 2rem; letter-spacing: 0.04em; }
  .brand span { color: #C8891A; font-style: italic; }
  h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 5vw, 2.8rem); font-weight: 700; color: #7A1A1A; margin-bottom: 1rem; line-height: 1.1; }
  .divider { width: 50px; height: 3px; background: #C8891A; margin: 1.5rem auto; border-radius: 2px; }
  p { font-size: 0.92rem; font-weight: 300; color: #8C7B68; line-height: 1.85; margin-bottom: 1rem; max-width: 380px; margin-left: auto; margin-right: auto; }
  .quote { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1rem; color: #4E0E0E; margin: 1.5rem auto; }
  .back-btn { display: inline-block; margin-top: 2rem; background: #7A1A1A; color: #FAF4E8; text-decoration: none; border-radius: 2rem; padding: 0.8rem 2.2rem; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; transition: background 0.2s; }
  .back-btn:hover { background: #4E0E0E; }
</style>
</head>
<body>
<div class="card">
  <span class="check">✅</span>
  <div class="brand">Fèl <span>Gou</span></div>
  <h1>Kòmand ou konfime!</h1>
  <div class="divider"></div>
  <p>Mèsi anpil pou kòmand ou. Ou pral resevwa yon imel konfirmasyon nan kèk minit.</p>
  <p>Nou ap ekspedye kolis ou a depi Miami nan 48è. Gou Ayiti pral rive nan pòt ou.</p>
  <p class="quote">"Epis ki grandi ak lanmou, livre ak kè." ✦</p>
  <a href="/" class="back-btn">← Tounen sou boutik la</a>
</div>
</body>
</html>
